<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信文章录入 - 日报系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        .btn-danger:hover {
            background: #ff3344;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .article-list {
            list-style: none;
        }
        .article-item {
            padding: 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        .article-item:last-child {
            border-bottom: none;
        }
        .article-info {
            flex: 1;
        }
        .article-url {
            color: #667eea;
            word-break: break-all;
            font-size: 13px;
        }
        .article-meta {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }
        .article-note {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .status-processed {
            background: #d4edda;
            color: #155724;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .empty-state p {
            margin-top: 10px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #999;
        }
        .tips {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        .tips h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #333;
        }
        .tips ul {
            margin-left: 20px;
            color: #666;
            font-size: 13px;
        }
        .tips li {
            margin-bottom: 4px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 0 10px;
            }
            .card {
                padding: 16px;
            }
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>微信文章录入</h1>
            <p>添加公众号文章链接，系统将自动抓取并整理到日报中</p>
        </div>

        <!-- 添加文章表单 -->
        <div class="card">
            <h2 class="card-title">添加文章</h2>
            <div id="alert" class="alert"></div>
            
            <form id="addForm">
                <div class="form-group">
                    <label for="url">文章链接 *</label>
                    <input type="url" id="url" class="form-control" 
                           placeholder="https://mp.weixin.qq.com/s/xxxxx" required>
                </div>
                <div class="form-group">
                    <label for="title">文章标题（可选）</label>
                    <input type="text" id="title" class="form-control" 
                           placeholder="如果不填，系统会自动抓取">
                </div>
                <div class="form-group">
                    <label for="note">备注（可选）</label>
                    <textarea id="note" class="form-control" 
                              placeholder="添加一些备注信息..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">添加文章</button>
                    <button type="reset" class="btn btn-secondary">清空表单</button>
                </div>
            </form>

            <div class="tips">
                <h4>使用提示</h4>
                <ul>
                    <li>在微信中打开文章，点击右上角「...」→「复制链接」</li>
                    <li>粘贴链接到上方输入框，点击添加即可</li>
                    <li>系统会在生成日报时自动抓取文章内容</li>
                </ul>
            </div>
        </div>

        <!-- 文章列表 -->
        <div class="card">
            <h2 class="card-title">已添加的文章</h2>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">总计</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">待处理</div>
                </div>
            </div>

            <div class="btn-group" style="margin-bottom: 16px;">
                <button class="btn btn-secondary" onclick="loadArticles()">刷新列表</button>
                <button class="btn btn-danger" onclick="clearProcessed()">清除已处理</button>
            </div>

            <ul id="articleList" class="article-list">
                <li class="empty-state">
                    <p>暂无文章，请添加公众号文章链接</p>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 显示提示消息
        function showAlert(message, isSuccess) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + (isSuccess ? 'alert-success' : 'alert-error');
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // 加载文章列表
        async function loadArticles() {
            try {
                const response = await fetch('/api/articles');
                const result = await response.json();
                
                const list = document.getElementById('articleList');
                const totalCount = document.getElementById('totalCount');
                const pendingCount = document.getElementById('pendingCount');
                
                totalCount.textContent = result.total;
                pendingCount.textContent = result.data.filter(a => a.status === 'pending').length;
                
                if (result.data.length === 0) {
                    list.innerHTML = `
                        <li class="empty-state">
                            <p>暂无文章，请添加公众号文章链接</p>
                        </li>
                    `;
                    return;
                }
                
                list.innerHTML = result.data.map(article => `
                    <li class="article-item">
                        <div class="article-info">
                            <a href="${article.url}" target="_blank" class="article-url">
                                ${article.title || article.url}
                            </a>
                            <div class="article-meta">
                                添加时间: ${article.added_at}
                                <span class="status-badge status-${article.status}">
                                    ${article.status === 'pending' ? '待处理' : '已处理'}
                                </span>
                            </div>
                            ${article.note ? `<div class="article-note">${article.note}</div>` : ''}
                        </div>
                        <button class="btn btn-danger" style="padding: 8px 12px; font-size: 12px;"
                                onclick="deleteArticle('${encodeURIComponent(article.url)}')">
                            删除
                        </button>
                    </li>
                `).reverse().join('');
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        // 添加文章
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const title = document.getElementById('title').value;
            const note = document.getElementById('note').value;
            
            try {
                const response = await fetch('/api/articles', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url, title, note })
                });
                
                const result = await response.json();
                showAlert(result.message, result.success);
                
                if (result.success) {
                    document.getElementById('addForm').reset();
                    loadArticles();
                }
            } catch (error) {
                showAlert('添加失败，请重试', false);
            }
        });

        // 删除文章
        async function deleteArticle(url) {
            if (!confirm('确定要删除这篇文章吗？')) return;
            
            try {
                await fetch(`/api/articles/${url}`, {
                    method: 'DELETE'
                });
                loadArticles();
            } catch (error) {
                console.error('删除失败:', error);
            }
        }

        // 清除已处理的文章
        async function clearProcessed() {
            if (!confirm('确定要清除所有已处理的文章吗？')) return;
            
            try {
                await fetch('/api/articles/clear', {
                    method: 'POST'
                });
                loadArticles();
            } catch (error) {
                console.error('清除失败:', error);
            }
        }

        // 页面加载时获取文章列表
        loadArticles();
    </script>
</body>
</html>
